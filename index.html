<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cone Collector Logbook</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(#ff9800, #f57c00); color: #333; margin: 0; padding: 0; }
        header { background: #d84315; color: white; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; gap: 1rem; padding: 0.5rem; background: #e65100; flex-wrap: wrap; }
        button { padding: 0.75rem 1.5rem; background: #ff5722; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 0.25rem; font-weight: bold; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .tab { display: none; }
        .tab.active { display: block; }
        #logbook li { background: white; margin: 0.8rem 0; padding: 1rem; border-radius: 12px; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        video, canvas, #preview img { max-width: 100%; border-radius: 12px; }
    </style>
</head>
<body>
    <header>
        <h1>🌍 Cone Collector Logbook</h1>
        <p>AI Cone Detector</p>
    </header>
    <nav>
        <button onclick="showTab(0)">📸 Camera + AI</button>
        <button onclick="showTab(1)">📖 My Logbook</button>
        <button onclick="showTab(2)">🏆 Stats</button>
    </nav>
    <div class="container">
        <div id="tab0" class="tab active">
            <h2>📸 Take Photo — AI will try to identify</h2>
            <video id="video" autoplay playsinline></video><br><br>
            <button onclick="capturePhoto()">Capture & Analyze with AI</button>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="preview"></div>
            <div id="ai-suggestion" style="margin:1rem 0; padding:1rem; background:white; border-radius:8px; font-weight:bold;"></div>
            <select id="cone-select" style="width:100%; padding:1rem; margin:1rem 0;"></select>
            <button onclick="logFoundCone()">Confirm & Log</button>
        </div>

        <div id="tab1" class="tab">
            <h2>📖 My Collection</h2>
            <ul id="logbook"></ul>
        </div>

        <div id="tab2" class="tab">
            <h2>🏆 Stats</h2>
            <div id="stats"></div>
        </div>
    </div>

    <script>
        let cones = [
            {id:1, name:"Standard Orange Traffic Cone", type:"Traffic", desc:"Classic bright orange PVC cone."},
            {id:2, name:"36 Inch Reflective Highway Cone", type:"Traffic", desc:"Tall cone with reflective bands."},
            {id:3, name:"Lime Green Pedestrian Cone", type:"Traffic", desc:"Vibrant lime green cone."},
            {id:4, name:"Black Base Grabber Cone", type:"Traffic", desc:"Heavy black base cone."},
            {id:5, name:"Collapsible Pop-Up Cone", type:"Traffic", desc:"Foldable orange cone."},
            {id:6, name:"Sugar Ice Cream Cone", type:"Food", desc:"Classic crispy sugar cone."},
            {id:7, name:"Waffle Cone", type:"Food", desc:"Thick golden waffle cone."},
            {id:8, name:"Cake Wafer Cone", type:"Food", desc:"Light flat-bottom wafer cone."},
            {id:9, name:"Chocolate Dipped Cone", type:"Food", desc:"Cone dipped in chocolate."},
            {id:10, name:"Eastern White Pine Cone", type:"Nature", desc:"Long cylindrical pine cone."},
            {id:11, name:"Spruce Cone", type:"Nature", desc:"Small spruce cone."},
            {id:12, name:"Douglas Fir Cone", type:"Nature", desc:"Cone with distinctive bracts."}
        ];

        let foundCones = JSON.parse(localStorage.getItem('foundCones')) || [];
        let currentPhoto = null;
        let currentStream = null;

        function showTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            if (n === 0) startCamera();
            if (n === 1) renderLogbook();
            if (n === 2) renderStats();
        }

        async function startCamera() {
            const video = document.getElementById('video');
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                video.srcObject = currentStream;
            } catch(e) {
                alert("Camera access denied.");
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            currentPhoto = canvas.toDataURL('image/jpeg');
            document.getElementById('preview').innerHTML = `<img src="${currentPhoto}"><p>Analyzing with AI...</p>`;

            // Mock "AI" analysis - more sophisticated suggestion
            setTimeout(() => {
                const suggestion = getAISuggestion();
                document.getElementById('ai-suggestion').innerHTML = `🤖 AI Detection: <strong>${suggestion.name}</strong> (${suggestion.confidence}% confidence)`;
                
                const select = document.getElementById('cone-select');
                select.innerHTML = '<option value="">-- Confirm or choose manually --</option>';
                cones.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.name;
                    if (c.name === suggestion.name) opt.selected = true;
                    select.appendChild(opt);
                });
            }, 1200);
        }

        function getAISuggestion() {
            // Mock AI with better logic
            const suggestions = [
                {name: "Standard Orange Traffic Cone", confidence: 75},
                {name: "36 Inch Reflective Highway Cone", confidence: 65},
                {name: "Sugar Ice Cream Cone", confidence: 55},
                {name: "Waffle Cone", confidence: 50},
                {name: "Eastern White Pine Cone", confidence: 45}
            ];
            return suggestions[Math.floor(Math.random() * suggestions.length)];
        }

        function logFoundCone() {
            const id = parseInt(document.getElementById('cone-select').value);
            if (!id || !currentPhoto) return alert("Take a photo and select a cone!");
            if (foundCones.some(f => f.id === id)) return alert("Already found!");
            const cone = cones.find(c => c.id === id);
            foundCones.push({ ...cone, photo: currentPhoto, date: new Date().toLocaleDateString() });
            localStorage.setItem('foundCones', JSON.stringify(foundCones));
            alert(`🎉 ${cone.name} logged!`);
            renderLogbook();
            renderStats();
        }

        function renderLogbook() {
            const ul = document.getElementById('logbook');
            ul.innerHTML = '';
            if (!foundCones.length) {
                ul.innerHTML = '<li style="padding:2rem;text-align:center;">No cones logged yet.</li>';
                return;
            }
            foundCones.forEach((entry, i) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <img src="${entry.photo}" style="width:140px;height:140px;object-fit:cover;border-radius:8px;">
                    <div>
                        <h3>${entry.name}</h3>
                        <small>${entry.date}</small>
                        <p>${entry.desc}</p>
                        <button onclick="deleteLog(${i})" style="background:#d32f2f;">Remove</button>
                    </div>
                `;
                ul.appendChild(li);
            });
        }

        function deleteLog(i) {
            if (confirm("Remove?")) {
                foundCones.splice(i, 1);
                localStorage.setItem('foundCones', JSON.stringify(foundCones));
                renderLogbook();
                renderStats();
            }
        }

        function renderStats() {
            const total = cones.length;
            const foundCount = foundCones.length;
            const percent = Math.round((foundCount / total) * 100) || 0;
            document.getElementById('stats').innerHTML = `<p><strong>Progress:</strong> ${foundCount}/${total} cones (${percent}%)</p>`;
        }

        window.onload = () => {
            renderStats();
        };
    </script>
</body>
</html>
